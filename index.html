<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ДляНеё</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f3eee3;
      --bg-2: #efe7da;
      --card: rgba(255, 251, 245, 0.82);
      --text: #5c1b24;
      --text-soft: #8b6168;
      --accent: #7a1626;
      --line: rgba(122, 22, 38, 0.12);
      --shadow: 0 12px 30px rgba(92, 27, 36, 0.08);
      --radius: 28px;
      --radius-sm: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.36), transparent 22%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 14px 14px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      display: block;
    }

    .brand-text h1 {
      margin: 0 0 4px;
      font-size: 26px;
      line-height: 1;
    }

    .brand-text p {
      margin: 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .card h2,
    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.75);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--accent);
      min-height: 18px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .chip.active {
      background: var(--accent);
      color: white;
    }

    .product {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .product h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .product p {
      margin: 0 0 10px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.4;
    }

    .price {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .small-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .small-btn.primary {
      background: var(--accent);
      color: white;
    }

    .small-btn.secondary {
      background: rgba(255,255,255,0.8);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .cart-box {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .field {
      margin-top: 10px;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 14px;
      background: rgba(255,255,255,0.84);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .profile-meta {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      font-size: 14px;
    }

    .muted {
      color: var(--text-soft);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="/Logo.png" alt="ДляНеё" class="brand-logo" />
        <div class="brand-text">
          <h1>ДляНеё</h1>
          <p>букеты с характером</p>
        </div>
      </div>

      <button type="button" id="profileBtn" class="icon-btn">☺</button>
    </div>

    <div class="card">
      <h2>Букеты для особенных моментов</h2>
      <p>Минималистично, спокойно, красиво. Выбирай букет, входи через Telegram и оформляй заказ прямо внутри mini app.</p>

      <div class="row">
        <button type="button" id="loginBtn" class="btn btn-primary">Войти через Telegram</button>
        <button type="button" id="cartBtn" class="btn btn-secondary">Корзина</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <div class="section-title">Подборки</div>
      <div id="chips" class="chips"></div>
    </div>

    <div class="card">
      <div class="section-title">Каталог</div>
      <div id="productsWrap"></div>
    </div>

    <div id="profileCard" class="card hidden">
      <h3>Профиль</h3>
      <p class="muted">Ваш текущий аккаунт внутри mini app.</p>
      <div id="profileText" class="profile-meta">Нет данных</div>

      <div class="row">
        <button type="button" id="logoutBtn" class="btn btn-secondary">Выйти</button>
      </div>
    </div>

    <div id="cartCard" class="card hidden">
      <h3>Корзина</h3>

      <div id="cartText" class="cart-box">Пусто</div>

      <div class="field">
        <input id="nameInput" type="text" placeholder="Имя" />
      </div>

      <div class="field">
        <input id="phoneInput" type="text" placeholder="Телефон" />
      </div>

      <div class="field">
        <input id="addressInput" type="text" placeholder="Адрес" />
      </div>

      <div class="field">
        <textarea id="commentInput" placeholder="Комментарий к заказу"></textarea>
      </div>

      <div class="row">
        <button type="button" id="orderBtn" class="btn btn-primary">Оформить заказ</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    try {
      tg?.expand();
      tg?.ready();
    } catch (e) {
      console.log('telegram init skipped');
    }

    const state = {
      user: null,
      cart: [],
      filter: 'Все',
      products: [
        {
          id: 1,
          title: 'Винный акцент',
          description: 'Глубокие оттенки и спокойная форма.',
          price: 4900,
          mood: 'Винные'
        },
        {
          id: 2,
          title: 'Нежная форма',
          description: 'Светлый букет с мягкой подачей.',
          price: 3800,
          mood: 'Нежные'
        },
        {
          id: 3,
          title: 'Тихое признание',
          description: 'Минималистичная композиция для особого жеста.',
          price: 4200,
          mood: 'Романтика'
        },
        {
          id: 4,
          title: 'Лёгкий жест',
          description: 'Небольшой красивый букет без лишнего шума.',
          price: 3100,
          mood: 'Повседневные'
        },
        {
          id: 5,
          title: 'Праздничный акцент',
          description: 'Более заметный букет для события.',
          price: 6500,
          mood: 'Праздник'
        }
      ]
    };

    const statusEl = document.getElementById('status');
    const profileBtn = document.getElementById('profileBtn');
    const loginBtn = document.getElementById('loginBtn');
    const cartBtn = document.getElementById('cartBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const profileCard = document.getElementById('profileCard');
    const profileText = document.getElementById('profileText');

    const cartCard = document.getElementById('cartCard');
    const cartText = document.getElementById('cartText');

    const chipsEl = document.getElementById('chips');
    const productsWrap = document.getElementById('productsWrap');

    const nameInput = document.getElementById('nameInput');
    const phoneInput = document.getElementById('phoneInput');
    const addressInput = document.getElementById('addressInput');
    const commentInput = document.getElementById('commentInput');
    const orderBtn = document.getElementById('orderBtn');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function saveUser(user) {
      localStorage.setItem('dlynee_user', JSON.stringify(user));
    }

    function readUser() {
      try {
        return JSON.parse(localStorage.getItem('dlynee_user') || 'null');
      } catch {
        return null;
      }
    }

    function clearUser() {
      localStorage.removeItem('dlynee_user');
    }

    function restoreUser() {
      const saved = readUser();
      if (saved) {
        state.user = saved;
      }
    }

    async function loadMe() {
      try {
        const res = await fetch('/api/me', {
          method: 'GET',
          credentials: 'include'
        });

        if (!res.ok) return;

        const data = await res.json();

        if (data?.user) {
          state.user = data.user;
          saveUser(data.user);
        }
      } catch (e) {
        console.log('me skipped');
      }
    }

    function renderProfile() {
      if (!state.user) {
        profileCard.classList.add('hidden');
        return;
      }

      profileCard.classList.remove('hidden');

      const username = state.user.username ? '@' + state.user.username : 'без username';
      const telegramId = state.user.telegram_id || state.user.id || '-';

      profileText.innerHTML = `
        <div><strong>Имя:</strong> ${state.user.first_name || '-'}</div>
        <div><strong>Фамилия:</strong> ${state.user.last_name || '-'}</div>
        <div><strong>Username:</strong> ${username}</div>
        <div><strong>ID Telegram:</strong> ${telegramId}</div>
      `;
    }

    function renderCart() {
      if (state.cart.length === 0) {
        cartText.textContent = 'Пусто';
        return;
      }

      const lines = state.cart.map(item => `${item.title} — ${item.price.toLocaleString('ru-RU')} ₽`);
      const total = state.cart.reduce((sum, item) => sum + item.price, 0);

      cartText.innerHTML = `
        ${lines.join('<br>')}
        <br><br>
        Итого: ${total.toLocaleString('ru-RU')} ₽
      `;
    }

    function toggleCart() {
      cartCard.classList.toggle('hidden');
      setStatus('Корзина открыта');
    }

    function openProfile() {
      if (!state.user) {
        profileCard.classList.remove('hidden');
        profileText.innerHTML = 'Вы не вошли';
        setStatus('Профиль открыт');
        return;
      }

      renderProfile();
      setStatus('Профиль открыт');
    }

    function getVisibleProducts() {
      if (state.filter === 'Все') return state.products;
      return state.products.filter(p => p.mood === state.filter);
    }

    function renderChips() {
      const filters = ['Все', 'Винные', 'Нежные', 'Романтика', 'Повседневные', 'Праздник'];
      chipsEl.innerHTML = '';

      filters.forEach(filter => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `chip ${state.filter === filter ? 'active' : ''}`;
        btn.textContent = filter;

        btn.addEventListener('click', () => {
          state.filter = filter;
          renderChips();
          renderProducts();
          setStatus(`Фильтр: ${filter}`);
        });

        chipsEl.appendChild(btn);
      });
    }

    function renderProducts() {
      productsWrap.innerHTML = '';

      const visible = getVisibleProducts();

      visible.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product';

        card.innerHTML = `
          <h3>${product.title}</h3>
          <p>${product.description}</p>
          <div class="price">${product.price.toLocaleString('ru-RU')} ₽</div>
          <div class="small-row">
            <button type="button" class="small-btn primary">Добавить</button>
            <button type="button" class="small-btn secondary">${product.mood}</button>
          </div>
        `;

        card.querySelector('.primary').addEventListener('click', () => {
          state.cart.push({
            id: product.id,
            title: product.title,
            price: product.price
          });
          renderCart();
          cartCard.classList.remove('hidden');
          setStatus(`Добавлено: ${product.title}`);
        });

        productsWrap.appendChild(card);
      });
    }

    async function loginTelegram() {
      const initData = tg?.initData;
      const user = tg?.initDataUnsafe?.user;

      if (!user) {
        setStatus('Открой mini app внутри Telegram');
        return;
      }

      setStatus('Пробуем войти...');

      try {
        const res = await fetch('/api/telegram-login', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            initData: initData || '',
            id: user.id,
            first_name: user.first_name || '',
            last_name: user.last_name || '',
            username: user.username || ''
          })
        });

        const text = await res.text();
        let data = {};

        try {
          data = JSON.parse(text);
        } catch {}

        if (!res.ok) {
          setStatus(data.error || text || 'Ошибка входа');
          return;
        }

        state.user = data.user || {
          id: user.id,
          telegram_id: user.id,
          first_name: user.first_name || '',
          last_name: user.last_name || '',
          username: user.username || ''
        };

        saveUser(state.user);
        renderProfile();
        setStatus('Вход сработал');
      } catch (error) {
        console.error(error);
        setStatus('Ошибка сети');
      }
    }

    async function logoutTelegram() {
      try {
        await fetch('/api/logout', {
          method: 'POST',
          credentials: 'include'
        });
      } catch (e) {
        console.log('logout request skipped');
      }

      state.user = null;
      clearUser();
      profileCard.classList.add('hidden');
      setStatus('Вы вышли');
    }

    async function createOrder() {
      if (!state.user) {
        setStatus('Сначала войди через Telegram');
        return;
      }

      if (state.cart.length === 0) {
        setStatus('Корзина пустая');
        return;
      }

      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const address = addressInput.value.trim();
      const comment = commentInput.value.trim();

      if (!name || !phone || !address) {
        setStatus('Заполни имя, телефон и адрес');
        return;
      }

      const total = state.cart.reduce((sum, item) => sum + item.price, 0);

      try {
        const res = await fetch('/api/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: state.user,
            customer: {
              name,
              phone,
              address,
              comment
            },
            items: state.cart,
            totals: {
              total
            }
          })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || 'Ошибка заказа');
          return;
        }

        setStatus('Заказ создан #' + data.order.id);

        state.cart = [];
        renderCart();

        nameInput.value = '';
        phoneInput.value = '';
        addressInput.value = '';
        commentInput.value = '';
      } catch (e) {
        console.error(e);
        setStatus('Ошибка сети');
      }
    }

    profileBtn.addEventListener('click', openProfile);
    loginBtn.addEventListener('click', loginTelegram);
    cartBtn.addEventListener('click', toggleCart);
    logoutBtn.addEventListener('click', logoutTelegram);
    orderBtn.addEventListener('click', createOrder);

    async function init() {
      restoreUser();
      renderProfile();
      renderCart();
      renderChips();
      renderProducts();
      await loadMe();
      renderProfile();
      setStatus('Mini app загружен');
    }

    init();
  </script>
</body>
</html>
