<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ДлянЁе | букеты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1720;
      color: white;
      padding: 24px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .muted {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>ДлянЁе | букеты</h1>

  <div class="card">
    <p id="status">Проверяем вход...</p>
    <p id="user"></p>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    async function registerUser() {
      const user = tg.initDataUnsafe?.user;

      if (!user) {
        document.getElementById('status').textContent = 'Не удалось получить данные Telegram.';
        return;
      }

      document.getElementById('user').textContent =
        `Привет, ${user.first_name}${user.username ? ' (@' + user.username + ')' : ''}`;
      document.getElementById('status').textContent = 'Регистрируем пользователя...';

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            telegram_id: user.id,
            first_name: user.first_name || '',
            last_name: user.last_name || '',
            username: user.username || '',
          }),
        });

        const data = await response.json();
        console.log('register result:', data);

        if (response.ok) {
          document.getElementById('status').textContent = 'Вы успешно зарегистрированы ✅';
        } else {
          document.getElementById('status').textContent = 'Ошибка регистрации ❌';
        }
      } catch (error) {
        console.error(error);
        document.getElementById('status').textContent = 'Ошибка соединения ❌';
      }
    }

    registerUser();
  </script>
</body>
</html>
