<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ДляНеё</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f3eee3;
      --bg-2: #efe7da;
      --card: rgba(255, 251, 245, 0.82);
      --text: #5c1b24;
      --text-soft: #8b6168;
      --accent: #7a1626;
      --line: rgba(122, 22, 38, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.36), transparent 22%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      display: block;
    }

    .brand-text h1 {
      margin: 0 0 4px;
      font-size: 26px;
      line-height: 1;
    }

    .brand-text p {
      margin: 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      cursor: pointer;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .card h2,
    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.75);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--accent);
      min-height: 18px;
    }

    .product {
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .product h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .product p {
      margin: 0 0 10px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.4;
    }

    .price {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .cart-box {
      font-size: 15px;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="/Logo.png" alt="ДляНеё" class="brand-logo" />
        <div class="brand-text">
          <h1>ДляНеё</h1>
          <p>букеты с характером</p>
        </div>
      </div>

      <button type="button" id="profileBtn" class="icon-btn">☺</button>
    </div>

    <div class="card">
      <h2>Тестовая живая страница</h2>
      <p>Сейчас проверяем, работают ли вообще кнопки и вход через Telegram.</p>

      <div class="row">
        <button type="button" id="loginBtn" class="btn btn-primary">Войти через Telegram</button>
        <button type="button" id="cartBtn" class="btn btn-secondary">Корзина</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h3>Каталог</h3>

      <div class="product">
        <h3>Винный акцент</h3>
        <p>Глубокие оттенки и спокойная форма.</p>
        <div class="price">4 900 ₽</div>
        <button type="button" class="btn btn-primary add-btn" data-title="Винный акцент">Добавить</button>
      </div>

      <div class="product">
        <h3>Нежная форма</h3>
        <p>Светлый букет с мягкой подачей.</p>
        <div class="price">3 800 ₽</div>
        <button type="button" class="btn btn-primary add-btn" data-title="Нежная форма">Добавить</button>
      </div>
    </div>

    <div id="profileCard" class="card hidden">
      <h3>Профиль</h3>
      <p id="profileText">Нет данных</p>

      <div class="row">
        <button type="button" id="logoutBtn" class="btn btn-secondary">Выйти</button>
      </div>
    </div>

    <div id="cartCard" class="card hidden">
  <h3>Корзина</h3>

  <div id="cartText" class="cart-box">Пусто</div>

  <div class="row">
    <input id="nameInput" placeholder="Имя" />
    <input id="phoneInput" placeholder="Телефон" />
    <input id="addressInput" placeholder="Адрес" />
  </div>

  <div class="row">
    <button id="orderBtn" class="btn btn-primary">Оформить заказ</button>
  </div>
</div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    try {
      tg?.expand();
      tg?.ready();
    } catch (e) {
      console.log('telegram init skipped');
    }

    const state = {
      user: null,
      cart: []
    };

    const statusEl = document.getElementById('status');
    const profileBtn = document.getElementById('profileBtn');
    const loginBtn = document.getElementById('loginBtn');
    const cartBtn = document.getElementById('cartBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const profileCard = document.getElementById('profileCard');
    const profileText = document.getElementById('profileText');

    const cartCard = document.getElementById('cartCard');
    const cartText = document.getElementById('cartText');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function saveUser(user) {
      localStorage.setItem('dlynee_user', JSON.stringify(user));
    }

    function readUser() {
      try {
        return JSON.parse(localStorage.getItem('dlynee_user') || 'null');
      } catch {
        return null;
      }
    }

    function clearUser() {
      localStorage.removeItem('dlynee_user');
    }

    function renderProfile() {
      if (!state.user) {
        profileCard.classList.add('hidden');
        return;
      }

      profileCard.classList.remove('hidden');
      const username = state.user.username ? '@' + state.user.username : 'без username';
      profileText.textContent =
        `Имя: ${state.user.first_name || '-'} | Username: ${username} | ID: ${state.user.telegram_id || state.user.id}`;
    }

    function renderCart() {
      if (state.cart.length === 0) {
        cartText.textContent = 'Пусто';
      } else {
        cartText.textContent = state.cart.join(', ');
      }
    }

    function toggleCart() {
      cartCard.classList.toggle('hidden');
      setStatus('Кнопка корзины работает');
    }

    function openProfile() {
      if (!state.user) {
        setStatus('Профиль открылся, но вы ещё не вошли');
        profileCard.classList.remove('hidden');
        profileText.textContent = 'Вы не вошли';
        return;
      }

      renderProfile();
      setStatus('Кнопка профиля работает');
    }

    async function loginTelegram() {
      const initData = tg?.initData;
      const user = tg?.initDataUnsafe?.user;

      if (!user) {
        setStatus('Открой mini app внутри Telegram');
        return;
      }

      setStatus('Пробуем войти...');

      try {
        const res = await fetch('/api/telegram-login', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            initData: initData || '',
            id: user.id,
            first_name: user.first_name || '',
            last_name: user.last_name || '',
            username: user.username || ''
          })
        });

        const text = await res.text();
        let data = {};

        try {
          data = JSON.parse(text);
        } catch {}

        if (!res.ok) {
          setStatus(data.error || text || 'Ошибка входа');
          return;
        }

        state.user = data.user || {
          id: user.id,
          telegram_id: user.id,
          first_name: user.first_name || '',
          last_name: user.last_name || '',
          username: user.username || ''
        };

        saveUser(state.user);
        renderProfile();
        setStatus('Вход сработал');
      } catch (error) {
        console.error(error);
        setStatus('Ошибка сети');
      }
    }

    async function logoutTelegram() {
      try {
        await fetch('/api/logout', {
          method: 'POST',
          credentials: 'include'
        });
      } catch (e) {
        console.log('logout request skipped');
      }

      state.user = null;
      clearUser();
      profileCard.classList.add('hidden');
      setStatus('Вы вышли');
    }

    async function loadMe() {
      try {
        const res = await fetch('/api/me', {
          method: 'GET',
          credentials: 'include'
        });

        if (!res.ok) return;

        const data = await res.json();

        if (data?.user) {
          state.user = data.user;
          saveUser(data.user);
          renderProfile();
          setStatus('Сессия восстановлена');
        }
      } catch (e) {
        console.log('me skipped');
      }
    }

    profileBtn.addEventListener('click', openProfile);
    loginBtn.addEventListener('click', loginTelegram);
    cartBtn.addEventListener('click', toggleCart);
    logoutBtn.addEventListener('click', logoutTelegram);

    document.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.cart.push(btn.dataset.title);
        renderCart();
        cartCard.classList.remove('hidden');
        setStatus(`Добавлено: ${btn.dataset.title}`);
      });
    });

    state.user = readUser();
    renderProfile();
    renderCart();
    loadMe();
    setStatus('JS загрузился');
  </script>
</body>
</html>
