<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ДляНеё</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3eee3;
      color: #5c1b24;
    }

    .app {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .logo {
      width: 140px;
      display: block;
      margin: 10px auto;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      border: none;
      margin-top: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .primary {
      background: #7a1626;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- ГЛАВНАЯ -->
  <div id="home">

    <img src="/Logo.png" class="logo">

    <h1>ДляНеё</h1>

    <button id="loginBtn" class="btn primary">
      Войти через Telegram
    </button>

    <div id="profile" class="card hidden">
      <h3>Вы вошли</h3>
      <p id="userInfo"></p>

      <button onclick="logout()" class="btn">
        Выйти
      </button>
    </div>

  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;

  const profileBlock = document.getElementById("profile");
  const userInfo = document.getElementById("userInfo");

  // если уже есть пользователь
  if (user) {
    login(user);
  }

  document.getElementById("loginBtn").onclick = () => {
    if (!user) {
      alert("Открой через Telegram");
      return;
    }
    login(user);
  };

  async function login(user) {

    // 🔥 отправляем на сервер
    await fetch("/api/telegram-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(user)
    });

    userInfo.innerText =
      user.first_name + " " + (user.username ? "@" + user.username : "");

    profileBlock.classList.remove("hidden");
  }

  function logout() {
    location.reload();
  }
</script>

</body>
</html>
