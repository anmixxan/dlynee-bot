<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ДляНеё | букеты</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f3eee3;
      --text: #5c1b24;
      --accent: #7a1626;
      --line: rgba(122, 22, 38, 0.15);
      --shadow: 0 10px 30px rgba(92, 27, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
  max-width: 480px;
  margin: 0 auto;
  padding: 2px 16px 20px; /* было 12px → стало 2px */
}

    /* 🔥 ШАПКА */
    .topbar {
  ...
  margin-top: -5px;   /* поднимаем вверх */
  margin-bottom: 10px;
}

    .brand {
      display: flex;
      align-items: center;
      gap: 6px; /* почти вплотную */
    }

    /* 🔥 БОЛЬШОЙ ЛОГО */
    .brand-mark {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -10px; /* прижимаем к краю */
    }

    .brand-logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      display: block;
    }

    /* 🔥 текст близко к лого */
    .brand-text {
      font-size: 18px;
      font-weight: 700;
      margin-left: -20px; /* подтягиваем ближе */
    }

    .login-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* 🔥 блок ниже */
    .hero {
      background: rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-top: -10px; /* поднимаем ближе к логотипу */
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      opacity: 0.8;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--accent);
    }

    .user {
      margin-top: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <img src="/Logo.png" alt="Логотип" class="brand-logo">
        </div>
        <div class="brand-text">ДляНеё</div>
      </div>

      <button id="loginBtn" class="login-btn">Войти</button>
    </div>

    <div class="hero">
      <h1>Букеты с характером</h1>
      <p>Минималистичные композиции. Заказ прямо в Telegram.</p>

      <div id="status" class="status"></div>
      <div id="user" class="user"></div>
    </div>

  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const loginBtn = document.getElementById('loginBtn');
    const statusEl = document.getElementById('status');
    const userEl = document.getElementById('user');

    async function login() {
      const user = tg.initDataUnsafe?.user;

      if (!user) {
        statusEl.textContent = 'Ошибка получения пользователя';
        return;
      }

      statusEl.textContent = 'Вход...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            telegram_id: user.id,
            first_name: user.first_name || '',
            last_name: user.last_name || '',
            username: user.username || ''
          })
        });

        if (res.ok) {
          loginBtn.textContent = user.first_name;
          statusEl.textContent = 'Вы вошли';
          userEl.textContent = `@${user.username || ''}`;
        } else {
          statusEl.textContent = 'Ошибка входа';
        }

      } catch (e) {
        statusEl.textContent = 'Ошибка сети';
      }
    }

    loginBtn.addEventListener('click', login);
  </script>

</body>
</html>
